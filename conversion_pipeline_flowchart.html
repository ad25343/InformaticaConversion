<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informatica Conversion Pipeline — Full Flowchart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%);
    border-bottom: 1px solid #2d3748;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f7fafc;
    letter-spacing: -0.02em;
  }
  header .subtitle {
    font-size: 13px;
    color: #718096;
    margin-top: 2px;
  }

  .legend {
    display: flex;
    gap: 20px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #a0aec0;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .canvas-wrap {
    overflow: auto;
    padding: 40px;
  }

  svg {
    display: block;
    overflow: visible;
  }

  /* ── Node base styles ─────────────────────────────── */
  .node-step rect     { rx: 8; }
  .node-gate rect     { rx: 8; }
  .node-decision path { }
  .node-output rect   { rx: 20; }
  .node-entry rect    { rx: 20; }
  .node-error rect    { rx: 6; }

  text {
    font-family: 'Segoe UI', system-ui, sans-serif;
    dominant-baseline: central;
    pointer-events: none;
  }

  .step-num {
    font-size: 10px;
    fill: rgba(255,255,255,0.5);
    font-weight: 700;
  }
  .node-label {
    font-size: 12px;
    font-weight: 600;
    fill: #f7fafc;
  }
  .node-sublabel {
    font-size: 10px;
    fill: rgba(255,255,255,0.6);
  }
  .edge-label {
    font-size: 10px;
    font-weight: 600;
    fill: #a0aec0;
  }
  .gate-label {
    font-size: 11px;
    font-weight: 700;
    fill: #ffd700;
  }
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    fill: #4a5568;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Informatica → Modern Stack Conversion Pipeline</h1>
    <div class="subtitle">Full end-to-end flow — all entry points, decision branches, gates, and error paths</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Pipeline Step</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Human Gate</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Decision</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Entry / Output</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Error / Reject</div>
  </div>
</header>

<div class="canvas-wrap">
<svg id="chart" xmlns="http://www.w3.org/2000/svg" width="1700" height="3400"></svg>
</div>

<script>
const svg = document.getElementById('chart');
const NS = 'http://www.w3.org/2000/svg';

// ── colour palette ───────────────────────────────────
const C = {
  step:    { fill: '#1e40af', stroke: '#3b82f6', text: '#f7fafc' },
  gate:    { fill: '#92400e', stroke: '#f59e0b', text: '#fef3c7' },
  decide:  { fill: '#4c1d95', stroke: '#8b5cf6', text: '#ede9fe' },
  entry:   { fill: '#065f46', stroke: '#10b981', text: '#d1fae5' },
  output:  { fill: '#134e4a', stroke: '#2dd4bf', text: '#ccfbf1' },
  error:   { fill: '#7f1d1d', stroke: '#ef4444', text: '#fee2e2' },
  warn:    { fill: '#451a03', stroke: '#f97316', text: '#fed7aa' },
  info:    { fill: '#1e3a5f', stroke: '#60a5fa', text: '#bfdbfe' },
};

// ── helpers ──────────────────────────────────────────
function el(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function g(cls='') {
  const e = el('g'); if(cls) e.setAttribute('class',cls); return e;
}
function append(parent, ...children) {
  children.forEach(c => parent.appendChild(c)); return parent;
}

// ── draw a process box ───────────────────────────────
function box(x,y,w,h, label, sublabel='', scheme=C.step, stepNum='', rx=8) {
  const grp = g('node-step');
  const r = el('rect', {x,y,width:w,height:h, rx,
    fill: scheme.fill, stroke: scheme.stroke, 'stroke-width':'1.5'});
  grp.appendChild(r);

  if(stepNum) {
    const sn = el('text', {x: x+8, y: y+10, class:'step-num'});
    sn.textContent = stepNum;
    grp.appendChild(sn);
  }

  const cy = sublabel ? y + h/2 - 7 : y + h/2;
  const lbl = el('text', {x: x+w/2, y: cy, 'text-anchor':'middle', class:'node-label',
    fill: scheme.text});
  lbl.textContent = label;
  grp.appendChild(lbl);

  if(sublabel) {
    const sub = el('text', {x: x+w/2, y: y+h/2+9, 'text-anchor':'middle', class:'node-sublabel',
      fill: scheme.text});
    sub.textContent = sublabel;
    grp.appendChild(sub);
  }

  svg.appendChild(grp);
  return {x,y,w,h, cx:x+w/2, cy:y+h/2, b:y+h, r:x+w, l:x, t:y};
}

// ── diamond decision ─────────────────────────────────
function diamond(cx, cy, hw, hh, label, sublabel='') {
  const grp = g('node-decision');
  const pts = `${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}`;
  const poly = el('polygon', {points: pts,
    fill: C.decide.fill, stroke: C.decide.stroke, 'stroke-width':'1.5'});
  grp.appendChild(poly);

  const cy2 = sublabel ? cy-6 : cy;
  const lbl = el('text', {x:cx, y:cy2, 'text-anchor':'middle', class:'node-label', fill: C.decide.text});
  lbl.textContent = label;
  grp.appendChild(lbl);
  if(sublabel) {
    const sub = el('text', {x:cx, y:cy+9, 'text-anchor':'middle', class:'node-sublabel', fill: C.decide.text});
    sub.textContent = sublabel;
    grp.appendChild(sub);
  }

  svg.appendChild(grp);
  return {cx, cy, hw, hh, t:cy-hh, b:cy+hh, l:cx-hw, r:cx+hw};
}

// ── pill (entry/output) ──────────────────────────────
function pill(x,y,w,h,label,sublabel='',scheme=C.entry) {
  return box(x,y,w,h,label,sublabel,scheme, '', Math.min(h/2,20));
}

// ── arrow ────────────────────────────────────────────
function arrow(x1,y1,x2,y2, label='', colour='#4a5568', dashed=false) {
  const grp = g();
  const mid = `M${x1},${y1} L${x2},${y2}`;
  const dashAttr = dashed ? '5,4' : null;
  const line = el('line', {x1,y1,x2,y2, stroke: colour, 'stroke-width':'1.5',
    'marker-end':'url(#arr)'});
  if(dashAttr) line.setAttribute('stroke-dasharray', dashAttr);
  grp.appendChild(line);
  if(label) {
    const lx = (x1+x2)/2 + 5;
    const ly = (y1+y2)/2;
    const bg = el('rect', {x: lx-2, y: ly-8, width: label.length*6.5+4, height:14,
      fill:'#0f1117', rx:3});
    const lt = el('text', {x: lx, y:ly, class:'edge-label'});
    lt.textContent = label;
    grp.appendChild(bg);
    grp.appendChild(lt);
  }
  svg.appendChild(grp);
}

// ── bent arrow (goes right or left then down) ────────
function bentArrow(x1,y1, x2,y2, label='', colour='#4a5568', midY=null) {
  const my = midY ?? (y1+y2)/2;
  const path = el('path', {
    d: `M${x1},${y1} L${x1},${my} L${x2},${my} L${x2},${y2}`,
    fill:'none', stroke:colour, 'stroke-width':'1.5', 'marker-end':'url(#arr)'});
  svg.appendChild(path);
  if(label) {
    const lx = (x1+x2)/2;
    const bg = el('rect', {x:lx-2, y:my-9, width:label.length*6.5+4, height:14, fill:'#0f1117', rx:3});
    const lt = el('text', {x:lx+2, y:my-2, class:'edge-label'});
    lt.textContent = label;
    svg.appendChild(bg);
    svg.appendChild(lt);
  }
}

// ── horizontal connector ─────────────────────────────
function hconn(x1,y1,x2,y2, label='', colour='#4a5568') {
  const grp = g();
  const path = el('path', {
    d:`M${x1},${y1} C${(x1+x2)/2},${y1} ${(x1+x2)/2},${y2} ${x2},${y2}`,
    fill:'none', stroke: colour, 'stroke-width':'1.5', 'marker-end':'url(#arr)'});
  grp.appendChild(path);
  if(label) {
    const lx=(x1+x2)/2; const ly=(y1+y2)/2;
    const bg = el('rect',{x:lx-2,y:ly-8,width:label.length*6.5+4,height:14,fill:'#0f1117',rx:3});
    const lt = el('text',{x:lx+2,y:ly,class:'edge-label'}); lt.textContent=label;
    grp.appendChild(bg); grp.appendChild(lt);
  }
  svg.appendChild(grp);
}

// ── section band ─────────────────────────────────────
function band(x,y,w,h,label,colour='#1a1f2e') {
  const r = el('rect', {x,y,width:w,height:h,fill:colour,rx:4, opacity:0.6});
  svg.appendChild(r);
  const t = el('text',{x:x+10,y:y+h/2,'text-anchor':'start',class:'section-label'});
  t.textContent = label;
  svg.appendChild(t);
}

// ── section separator line ───────────────────────────
function sep(y, label='') {
  const l = el('line',{x1:20,y1:y,x2:1680,y2:y,stroke:'#2d3748','stroke-width':'1','stroke-dasharray':'4,6'});
  svg.appendChild(l);
  if(label) {
    const t = el('text',{x:30,y:y-5,class:'section-label'}); t.textContent=label; svg.appendChild(t);
  }
}

// ── arrowhead marker ─────────────────────────────────
function addDefs() {
  const defs = el('defs');
  // default grey arrow
  const m = el('marker',{id:'arr',markerWidth:'10',markerHeight:'7',refX:'9',refY:'3.5',orient:'auto'});
  const p = el('polygon',{points:'0 0, 10 3.5, 0 7',fill:'#4a5568'});
  m.appendChild(p); defs.appendChild(m);

  // green arrow
  const mg = el('marker',{id:'arr-g',markerWidth:'10',markerHeight:'7',refX:'9',refY:'3.5',orient:'auto'});
  mg.appendChild(el('polygon',{points:'0 0, 10 3.5, 0 7',fill:'#10b981'})); defs.appendChild(mg);
  // amber arrow
  const ma = el('marker',{id:'arr-a',markerWidth:'10',markerHeight:'7',refX:'9',refY:'3.5',orient:'auto'});
  ma.appendChild(el('polygon',{points:'0 0, 10 3.5, 0 7',fill:'#f59e0b'})); defs.appendChild(ma);
  // red arrow
  const mr = el('marker',{id:'arr-r',markerWidth:'10',markerHeight:'7',refX:'9',refY:'3.5',orient:'auto'});
  mr.appendChild(el('polygon',{points:'0 0, 10 3.5, 0 7',fill:'#ef4444'})); defs.appendChild(mr);

  svg.insertBefore(defs, svg.firstChild);
}

// ── helper: multi-line text inside box ───────────────
function mtext(x,y,lines,fontSize=11,fill='#a0aec0') {
  const lh = fontSize + 4;
  lines.forEach((line,i) => {
    const t = el('text',{x, y: y + i*lh, 'font-size':fontSize, fill, 'text-anchor':'start'});
    t.textContent = line;
    svg.appendChild(t);
  });
}

// ═══════════════════════════════════════════════════════
//  LAYOUT CONSTANTS
// ═══════════════════════════════════════════════════════
const CX   = 850;   // main column centre
const BW   = 240;   // standard box width
const BH   = 54;    // standard box height
const GH   = 60;    // gate box height
const DW   = 110;   // diamond half-width
const DH   = 38;    // diamond half-height
const GAP  = 30;    // vertical gap between nodes

// side columns
const LEFT1 = 140;  // far-left panels
const LEFT2 = 380;  // inner-left panels
const RIGHT1 = 1260; // inner-right panels
const RIGHT2 = 1480; // far-right panels

// ═══════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════
addDefs();

// background grid hint
const bg = el('rect',{x:0,y:0,width:1700,height:3400,fill:'#0a0e1a'});
svg.insertBefore(bg, svg.firstChild);

let Y = 40; // current Y cursor

// ── SECTION: ENTRY POINTS ──────────────────────────────
band(20, Y-10, 1660, 140, '① ENTRY POINTS', '#111827');

// Four entry point pills
const ep1 = pill( 60, Y+10, 170, 48, '3-File Upload', 'XML + YAML + doc', C.entry);
const ep2 = pill(260, Y+10, 170, 48, 'ZIP Upload',    'archive w/ files',  C.entry);
const ep3 = pill(460, Y+10, 170, 48, 'Batch ZIP',     'multi-mapping archive', C.entry);
const ep4 = pill(660, Y+10, 170, 48, 'Manifest Watcher', 'auto-poll /watch dir', C.entry);

// API endpoint labels
mtext(60, Y+65,  ['POST /convert'], 9, '#4a5568');
mtext(260, Y+65, ['POST /convert/zip'], 9, '#4a5568');
mtext(460, Y+65, ['POST /convert/batch'], 9, '#4a5568');
mtext(660, Y+65, ['background task'], 9, '#4a5568');

Y += 130;

// ── STEP 0: Session Parse ──────────────────────────────
sep(Y - 5);
const s0 = box(CX-BW/2, Y, BW, BH, 'STEP 0 — Session Parse', 'zip_extractor / route handler', C.step, 'S0');
// entry arrows converging
bentArrow(ep1.cx, ep1.b, s0.cx-60, s0.t, '', '#10b981');
bentArrow(ep2.cx, ep2.b, s0.cx-20, s0.t, '', '#10b981');
bentArrow(ep3.cx, ep3.b, s0.cx+20, s0.t, '', '#10b981');
bentArrow(ep4.cx, ep4.b, s0.cx+60, s0.t, '', '#10b981');

// Decision: upload type
Y += BH + GAP;
const d0 = diamond(CX, Y+DH, DW, DH, 'Upload type?', 'single / batch / watch');
arrow(s0.cx, s0.b, d0.cx, d0.t, '', '#4a5568');

Y += DH*2 + GAP;

// batch branch (left) → parallel orchestration note
const batchBox = box(LEFT2-60, Y-30, 200, 44, 'Batch Orchestrator', 'up to 3 concurrent / mapping', C.info);
bentArrow(d0.l, d0.cy, batchBox.r, batchBox.cy, 'batch', '#60a5fa');
mtext(LEFT2-60, Y+22, ['→ loops per mapping', '→ aggregates results'], 9, '#60a5fa');

// single / watcher falls through
arrow(d0.cx, d0.b, d0.cx, d0.b+GAP, 'single / watcher');

// ── STEP 1: Parse XML ─────────────────────────────────
Y = d0.b + GAP + 10;
const s1 = box(CX-BW/2, Y, BW, BH, 'STEP 1 — Parse XML', 'parser_agent.parse_xml()', C.step, 'S1');
arrow(d0.cx, d0.b, s1.cx, s1.t);

// side note: what's parsed
const p1note = box(RIGHT1, Y-8, 260, 70, 'Extracts from XML', '', C.info);
mtext(RIGHT1+8, Y+12, [
  '• SOURCE (db_type, fields, flat_file attrs)',
  '• TARGET (table, fields)',
  '• TRANSFORMATIONs (type, ports, exprs)',
  '• CONNECTOR graph (wiring)',
  '• _merge_flatfile_sq_attribs()',
], 9.5, '#bfdbfe');
arrow(s1.r, s1.cy, p1note.l, p1note.cy, '', '#60a5fa');

// flat file decision
Y += BH + GAP;
const dff = diamond(CX, Y+DH, DW, DH, 'Source type?', 'DB vs Flat File');
arrow(s1.cx, s1.b, dff.cx, dff.t);

Y += DH*2 + GAP;

// flat file branch (right)
const ffBox = box(RIGHT1, Y-20, 240, 54, 'Flat File Config', 'path / delimiter / has_header', C.info);
bentArrow(dff.r, dff.cy, ffBox.l, ffBox.cy, 'Flat File', '#60a5fa');
mtext(RIGHT1+8, Y+40, ['type: flat_file in YAML skeleton', 'FlatFileReader at convert time'], 9, '#60a5fa');

// db branch falls through
arrow(dff.cx, dff.b, dff.cx, dff.b+GAP, 'Database');

// ── STEP 2: Classify Pattern ──────────────────────────
Y = dff.b + GAP + 10;
const s2 = box(CX-BW/2, Y, BW, BH, 'STEP 2 — Classify Pattern', 'classifier_agent._classify_pattern()', C.step, 'S2');
arrow(dff.cx, dff.b, s2.cx, s2.t);
bentArrow(ffBox.cx, ffBox.b, s2.r, s2.cy, '', '#60a5fa');

// 10-rule panel (left)
const p2note = box(LEFT1-30, Y-30, 290, 190, '10-Rule Priority Classifier', '', C.info);
mtext(LEFT1-20, Y-10, [
  'R1  filter_and_route    (Router trans)',
  'R2  union_consolidate   (Union trans)',
  'R3  aggregation_load    (Aggregator)',
  'R4  scd2                (SCD trans / keys)',
  'R5  upsert              (Update Strategy)',
  'R6  lookup_enrich       (Lookup trans)',
  'R7  incremental_append  (Filter + SQ SQL)',
  'R8  expression_transform (Exp-only)',
  'R9  truncate_and_load   (default 1→1)',
  'R10 pass_through        (fallback)',
], 9.5, '#bfdbfe');
arrow(s2.l, s2.cy, p2note.r, p2note.cy, '', '#60a5fa');

// complexity tier decision
Y += BH + GAP;
const dtier = diamond(CX, Y+DH, DW+10, DH, 'Complexity tier?', 'field count / trans count / pattern');
arrow(s2.cx, s2.b, dtier.cx, dtier.t);

Y += DH*2 + GAP;

// Tier boxes
const tL  = box(CX-380, Y, 130, 44, 'LOW',       '≤8 fields, 1-2 trans',  C.info);
const tM  = box(CX-230, Y, 130, 44, 'MEDIUM',    '≤20 fields, 3-5 trans', C.info);
const tH  = box(CX-80,  Y, 130, 44, 'HIGH',      '≤50 fields, 6-9 trans', C.info);
const tVH = box(CX+70,  Y, 150, 44, 'VERY_HIGH', '>50 fields / complex',  C.warn);

bentArrow(dtier.l, dtier.cy, tL.cx, tL.t,  'LOW',       '#60a5fa');
bentArrow(dtier.l, dtier.cy, tM.cx, tM.t,  'MEDIUM',    '#60a5fa');
bentArrow(dtier.cx, dtier.b, tH.cx, tH.t,  'HIGH',      '#60a5fa');
bentArrow(dtier.r, dtier.cy, tVH.cx, tVH.t,'VERY_HIGH', '#f97316');

// all tier boxes converge back
Y += 44 + GAP;
const mergeY1 = Y;
const tierMerge = { cx: CX, cy: mergeY1 };

bentArrow(tL.cx,  tL.b,  CX-240, mergeY1, '', '#4a5568');
bentArrow(tM.cx,  tM.b,  CX-80, mergeY1, '', '#4a5568');
bentArrow(tH.cx,  tH.b,  CX+80, mergeY1, '', '#4a5568');
bentArrow(tVH.cx, tVH.b, CX+240, mergeY1, '', '#4a5568');

// horizontal merge line
const ml = el('line',{x1:CX-240,y1:mergeY1,x2:CX+240,y2:mergeY1,stroke:'#4a5568','stroke-width':'1.5'});
svg.appendChild(ml);
arrow(CX, mergeY1, CX, mergeY1+GAP/2);

// ── STEP 3: Source-to-Target ───────────────────────────
Y = mergeY1 + GAP/2 + 10;
const s3 = box(CX-BW/2, Y, BW, BH, 'STEP 3 — Source-to-Target (S2T)', 's2t_agent: field lineage map', C.step, 'S3');

// s3 right note
const p3note = box(RIGHT1, Y, 240, 60, 'S2T Output', '', C.info);
mtext(RIGHT1+8, Y+16, [
  '• source → target field mapping',
  '• transformation expressions',
  '• data type conversions',
  '• S2T YAML artifact saved',
], 9.5, '#bfdbfe');
arrow(s3.r, s3.cy, p3note.l, p3note.cy, '', '#60a5fa');

// ── STEP 4: Generate Documentation ────────────────────
Y += BH + GAP;
arrow(s3.cx, s3.b, s3.cx, s3.b+GAP/2);
const s4 = box(CX-BW/2, Y, BW, BH, 'STEP 4 — Generate Documentation', 'docs_agent: mapping spec', C.step, 'S4');
arrow(s3.cx, s3.b, s4.cx, s4.t);

const p4note = box(RIGHT1, Y, 240, 60, 'Docs Output', '', C.info);
mtext(RIGHT1+8, Y+16, [
  '• mapping_spec.md (business rules)',
  '• complexity summary',
  '• transformation descriptions',
  '• pattern classification rationale',
], 9.5, '#bfdbfe');
arrow(s4.r, s4.cy, p4note.l, p4note.cy, '', '#60a5fa');

// ── STEP 5: Verify ─────────────────────────────────────
Y += BH + GAP;
const s5 = box(CX-BW/2, Y, BW, BH, 'STEP 5 — Verify', 'verification_agent: 5 checks', C.step, 'S5');
arrow(s4.cx, s4.b, s5.cx, s5.t);

const p5note = box(RIGHT1, Y-10, 240, 80, 'Verification Checks', '', C.info);
mtext(RIGHT1+8, Y+8, [
  '1. Source fields ↔ S2T completeness',
  '2. Target fields ↔ S2T completeness',
  '3. Expression syntax (IIF/DECODE/…)',
  '4. Data-type compatibility',
  '5. Circular dependency scan',
  '  + Scale anti-pattern flags (INFO)',
], 9.5, '#bfdbfe');
arrow(s5.r, s5.cy, p5note.l, p5note.cy, '', '#60a5fa');

// verify decision: blocking?
Y += BH + GAP;
const dvfy = diamond(CX, Y+DH, DW+20, DH, 'Blocking flags?', 'ERROR severity');
arrow(s5.cx, s5.b, dvfy.cx, dvfy.t);

Y += DH*2 + GAP;

// blocking → error
const vfyErr = box(LEFT1-30, Y-20, 180, 44, 'Mark FAILED', 'return error to caller', C.error);
bentArrow(dvfy.l, dvfy.cy, vfyErr.r, vfyErr.cy, 'YES — blocking', '#ef4444');

// no blocking → gate 1
arrow(dvfy.cx, dvfy.b, dvfy.cx, dvfy.b+GAP, 'NO — pass (warn OK)');

// ── GATE 1 ────────────────────────────────────────────
Y = dvfy.b + GAP + 10;
sep(Y-8, '⚑  HUMAN REVIEW GATE 1');
const g1 = box(CX-BW/2, Y, BW, GH, '🔍  GATE 1 — Review Parsed Output', 'Human reviews S2T + docs', C.gate, '', 10);
arrow(dvfy.cx, dvfy.b, g1.cx, g1.t);

// Gate 1 decision
Y += GH + GAP;
const dg1 = diamond(CX, Y+DH, DW+10, DH, 'Reviewer decision?', 'approve / reject / amend');
arrow(g1.cx, g1.b, dg1.cx, dg1.t);

Y += DH*2 + GAP;

// reject path (left)
const g1rej = box(LEFT1-30, Y-10, 190, 44, 'Reject — STOP', 'job marked REJECTED', C.error);
bentArrow(dg1.l, dg1.cy, g1rej.r, g1rej.cy, 'Reject', '#ef4444');

// amend/remediate path (right)
const g1rem = box(RIGHT1, Y-10, 210, 44, 'Amend & Re-verify', 'human edits S2T → Step 5 loop', C.warn);
bentArrow(dg1.r, dg1.cy, g1rem.l, g1rem.cy, 'Amend', '#f97316');
// loop back arrow (right side)
const loopY1 = Y - 10;
bentArrow(g1rem.r+20, g1rem.cy, g1rem.r+20, s5.cy, '', '#f97316', loopY1);
// horizontal to s5.r
const la1 = el('line',{x1:g1rem.r+20,y1:s5.cy,x2:s5.r,y2:s5.cy,stroke:'#f97316','stroke-width':'1.5','marker-end':'url(#arr-a)'});
svg.appendChild(la1);

// approve → step 6
arrow(dg1.cx, dg1.b, dg1.cx, dg1.b+GAP, 'Approve');

// ── STEP 6: Stack Assignment ───────────────────────────
Y = dg1.b + GAP + 10;
const s6 = box(CX-BW/2, Y, BW, BH, 'STEP 6 — Stack Assignment', 'stack_agent: choose target tech', C.step, 'S6');
arrow(dg1.cx, dg1.b, s6.cx, s6.t);

// stack decision
Y += BH + GAP;
const dstack = diamond(CX, Y+DH, DW, DH, 'Target stack?');
arrow(s6.cx, s6.b, dstack.cx, dstack.t);

Y += DH*2 + GAP;

const stA = box(CX-490, Y, 130, 44, 'PySpark',  'Databricks / EMR',  C.step);
const stB = box(CX-340, Y, 130, 44, 'dbt',      'BigQuery/Snowflake', C.step);
const stC = box(CX-190, Y, 130, 44, 'Python',   'Pandas + SQLAlchemy',C.step);
const stD = box(CX-40,  Y, 130, 44, 'SQL',      'Oracle / MSSQL raw', C.step);
const stE = box(CX+110, Y, 130, 44, 'Glue',     'AWS Glue ETL',       C.step);

bentArrow(dstack.l, dstack.cy, stA.cx, stA.t, 'PySpark',  '#3b82f6');
bentArrow(dstack.l, dstack.cy, stB.cx, stB.t, 'dbt',      '#3b82f6');
bentArrow(dstack.cx,dstack.b,  stC.cx, stC.t, 'Python',   '#3b82f6');
bentArrow(dstack.r, dstack.cy, stD.cx, stD.t, 'SQL',      '#3b82f6');
bentArrow(dstack.r, dstack.cy, stE.cx, stE.t, 'Glue',     '#3b82f6');

// all stacks converge
Y += 44 + GAP;
const mergeY2 = Y;
[stA,stB,stC,stD,stE].forEach(s => bentArrow(s.cx, s.b, CX, mergeY2, '', '#4a5568'));
arrow(CX, mergeY2, CX, mergeY2 + GAP/2);

// ── STEP 7: Convert Code ──────────────────────────────
Y = mergeY2 + GAP/2 + 10;
const s7 = box(CX-BW/2, Y, BW, BH, 'STEP 7 — Convert Code', 'conversion_agent (per-stack prompt)', C.step, 'S7');

// conversion detail left
const p7note = box(LEFT1-30, Y-10, 270, 110, 'Conversion Agent', '', C.info);
mtext(LEFT1-20, Y+10, [
  'System prompts per stack:',
  '  PYSPARK_SYSTEM  → broadcast, partition,',
  '    shuffle hints, UDF ban (v2.5)',
  '  DBT_SYSTEM      → materialisation rules,',
  '    incremental strategy (v2.5)',
  '  PYTHON_SYSTEM   → chunked I/O, no iterrows',
  '    (v2.5)',
  'Flat-file: FlatFileReader injected',
  'IIF/DECODE → native target functions',
], 9.5, '#bfdbfe');
arrow(s7.l, s7.cy, p7note.r, p7note.cy, '', '#60a5fa');

// validate conversion files
Y += BH + GAP;
const s7v = box(CX-BW/2, Y, BW, BH, 'Validate Generated Files', '_validate_conversion_files() + scale scan', C.step, '');
arrow(s7.cx, s7.b, s7v.cx, s7v.t);

// scale warnings (right)
const swarn = box(RIGHT1, Y, 240, 70, 'Scale Anti-pattern Scan (v2.5)', '', C.warn);
mtext(RIGHT1+8, Y+18, [
  'INFO flags (non-blocking):',
  '  .collect() on large DF',
  '  pd.read_csv() w/o chunksize',
  '  .iterrows() on large data',
], 9.5, '#fed7aa');
arrow(s7v.r, s7v.cy, swarn.l, swarn.cy, '', '#f97316');

// ── STEP 8: Security Scan ─────────────────────────────
Y += BH + GAP;
const s8 = box(CX-BW/2, Y, BW, BH, 'STEP 8 — Security Scan', 'security_agent: credential / injection scan', C.step, 'S8');
arrow(s7v.cx, s7v.b, s8.cx, s8.t);

const p8note = box(RIGHT1, Y, 240, 60, 'Security Checks', '', C.info);
mtext(RIGHT1+8, Y+16, [
  '• hardcoded credentials / passwords',
  '• SQL injection patterns',
  '• unsafe dynamic SQL construction',
  '• path traversal in file reads',
], 9.5, '#bfdbfe');
arrow(s8.r, s8.cy, p8note.l, p8note.cy, '', '#60a5fa');

Y += BH + GAP;
const dsec = diamond(CX, Y+DH, DW+20, DH, 'Security issues?', 'blocking vs advisory');
arrow(s8.cx, s8.b, dsec.cx, dsec.t);

Y += DH*2 + GAP;
const secErr = box(LEFT1-30, Y-20, 190, 44, 'Mark BLOCKED', 'remediation required', C.error);
bentArrow(dsec.l, dsec.cy, secErr.r, secErr.cy, 'Blocking', '#ef4444');

arrow(dsec.cx, dsec.b, dsec.cx, dsec.b+GAP, 'Clean / advisory');

// ── GATE 2 ────────────────────────────────────────────
Y = dsec.b + GAP + 10;
sep(Y-8, '⚑  HUMAN REVIEW GATE 2');
const g2 = box(CX-BW/2, Y, BW, GH, '🔒  GATE 2 — Review Generated Code', 'Human reviews code + security report', C.gate, '', 10);
arrow(dsec.cx, dsec.b, g2.cx, g2.t);

Y += GH + GAP;
const dg2 = diamond(CX, Y+DH, DW+10, DH, 'Reviewer decision?');
arrow(g2.cx, g2.b, dg2.cx, dg2.t);

Y += DH*2 + GAP;
const g2rej = box(LEFT1-30, Y-10, 190, 44, 'Reject — STOP', 'job marked REJECTED', C.error);
bentArrow(dg2.l, dg2.cy, g2rej.r, g2rej.cy, 'Reject', '#ef4444');

const g2rem = box(RIGHT1, Y-10, 210, 44, 'Request Changes', 'comment → regen loop', C.warn);
bentArrow(dg2.r, dg2.cy, g2rem.l, g2rem.cy, 'Changes', '#f97316');
bentArrow(g2rem.r+20, g2rem.cy, g2rem.r+20, s7.cy, '', '#f97316');
const la2 = el('line',{x1:g2rem.r+20,y1:s7.cy,x2:s7.r,y2:s7.cy,stroke:'#f97316','stroke-width':'1.5','marker-end':'url(#arr-a)'});
svg.appendChild(la2);

arrow(dg2.cx, dg2.b, dg2.cx, dg2.b+GAP, 'Approve');

// ── STEP 9: Code Review ───────────────────────────────
Y = dg2.b + GAP + 10;
const s9 = box(CX-BW/2, Y, BW, BH, 'STEP 9 — Code Review', 'review_agent: Stage A + B + C', C.step, 'S9');
arrow(dg2.cx, dg2.b, s9.cx, s9.t);

const p9note = box(RIGHT1, Y-10, 240, 90, 'Three-Stage Review (v2.5)', '', C.info);
mtext(RIGHT1+8, Y+10, [
  'Stage A: Logic equivalence',
  '  (does output match Informatica logic?)',
  'Stage B: Code quality + best practice',
  '  (idiomatic, readable, maintainable)',
  'Stage C: Performance anti-patterns',
  '  (collect, UDFs, iterrows, materialize)',
  '  → PerfReviewReport (advisory only)',
], 9.5, '#bfdbfe');
arrow(s9.r, s9.cy, p9note.l, p9note.cy, '', '#60a5fa');

Y += BH + GAP;
const drev = diamond(CX, Y+DH, DW+10, DH, 'Review result?', 'PASS / WARN / FAIL');
arrow(s9.cx, s9.b, drev.cx, drev.t);

Y += DH*2 + GAP;
const revFail = box(LEFT1-30, Y-10, 190, 44, 'FAIL — block', 'must fix before Gate 3', C.error);
bentArrow(drev.l, drev.cy, revFail.r, revFail.cy, 'FAIL', '#ef4444');

const revWarn = box(CX+240, Y-10, 190, 44, 'WARN — advisory', 'surfaced in UI code tab', C.warn);
bentArrow(drev.r, drev.cy, revWarn.l, revWarn.cy, 'WARN', '#f97316');

arrow(drev.cx, drev.b, drev.cx, drev.b+GAP, 'PASS');

// ── GATE 3 ────────────────────────────────────────────
Y = drev.b + GAP + 10;
sep(Y-8, '⚑  HUMAN REVIEW GATE 3');
const g3 = box(CX-BW/2, Y, BW, GH, '✅  GATE 3 — Final Approval', 'Human reviews code review + perf report', C.gate, '', 10);
arrow(drev.cx, drev.b, g3.cx, g3.t);

Y += GH + GAP;
const dg3 = diamond(CX, Y+DH, DW+10, DH, 'Reviewer decision?');
arrow(g3.cx, g3.b, dg3.cx, dg3.t);

Y += DH*2 + GAP;
const g3rej = box(LEFT1-30, Y-10, 190, 44, 'Reject — STOP', 'job marked REJECTED', C.error);
bentArrow(dg3.l, dg3.cy, g3rej.r, g3rej.cy, 'Reject', '#ef4444');

arrow(dg3.cx, dg3.b, dg3.cx, dg3.b+GAP, 'Approve');

// ── STEP 10: Export ───────────────────────────────────
Y = dg3.b + GAP + 10;
sep(Y-8);
const s10 = box(CX-BW/2, Y, BW, BH, 'STEP 10 — Export Artifact', 'zip_exporter: package all outputs', C.step, 'S10');
arrow(dg3.cx, dg3.b, s10.cx, s10.t);

// output artifacts
Y += BH + GAP;
const outBox = box(CX-BW/2, Y, BW, 100, 'OUTPUT ZIP', '', C.output);
arrow(s10.cx, s10.b, outBox.cx, outBox.t);
mtext(CX-BW/2+12, Y+18, [
  '📄  converted code files (main.py / models/*.sql…)',
  '📋  S2T mapping YAML',
  '📝  mapping_spec.md (documentation)',
  '🔍  code_review.json (Stage A/B/C)',
  '⚡  perf_review.json (advisory)',
  '🔒  security_report.json',
], 10, '#ccfbf1');

Y += 100 + GAP;
const done = pill(CX-100, Y, 200, 48, '✓ JOB COMPLETE', 'status = COMPLETED', C.output);
arrow(outBox.cx, outBox.b, done.cx, done.t);

// ── BATCH STATUS AGGREGATE ────────────────────────────
Y += 48 + GAP + 10;
sep(Y-8, 'BATCH PATH');
const batchAgg = box(CX-BW/2, Y, BW, BH, 'Batch Aggregator', 'collect per-mapping results', C.info);
mtext(CX-BW/2+8, Y+BH+6, ['Returns: {total, completed, failed, artifacts[]}'], 9.5, '#60a5fa');

// connecting batch orchestrator box
bentArrow(batchBox.cx, batchBox.b, batchAgg.l, batchAgg.cy, 'aggregates all', '#60a5fa');
bentArrow(done.cx, done.b, done.cx, done.b+20, '', '#4a5568');

// ── SQLITE + WAL NOTE ──────────────────────────────────
Y += BH + 60;
sep(Y-8, 'INFRASTRUCTURE (v2.5.0)');

const infra = box(LEFT1-30, Y, 380, 100, 'database.py — SQLite + WAL (v2.5)', '', C.info);
mtext(LEFT1-20, Y+20, [
  'PRAGMA journal_mode=WAL  (concurrent reads)',
  'PRAGMA synchronous=NORMAL',
  'jobs table columns:',
  '  job_id, status, current_step,',
  '  complexity_tier (NEW v2.5),',
  '  state_json (gzipped), created_at, updated_at',
], 9.5, '#bfdbfe');

const pagn = box(CX+100, Y, 340, 100, 'GET /jobs — Paginated (v2.5)', '', C.info);
mtext(CX+110, Y+20, [
  'Query params: ?limit=50&offset=0&status=',
  'Response envelope:',
  '  { "total": N, "jobs": [...] }',
  'SELECT job_id, status, current_step,',
  '  complexity_tier, created_at, updated_at',
  '  FROM jobs LIMIT :limit OFFSET :offset',
], 9.5, '#bfdbfe');

// ── adjust SVG height ─────────────────────────────────
const svgH = Y + 120;
svg.setAttribute('height', svgH);

// ── final title overlay ────────────────────────────────
const title = el('text',{x:CX, y:20, 'text-anchor':'middle', 'font-size':'15',
  'font-weight':'700', fill:'#718096', opacity:'0.5'});
title.textContent = 'Informatica Conversion Pipeline — v2.5.0 — All Scenarios';
svg.appendChild(title);

</script>
</body>
</html>
