<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Informatica Conversion Tool — Sign In</title>
  <script>
    (function(){ var t=localStorage.getItem('theme')||'dark'; document.documentElement.setAttribute('data-theme',t); })();
  </script>
  <style>
    :root, [data-theme="dark"] {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #252836;
      --border: #2e3145; --accent: #6c63ff; --text: #e2e8f0;
      --muted: #94a3b8; --danger: #f87171; --radius: 12px;
    }
    [data-theme="light"] {
      --bg: #f0f2f5; --surface: #ffffff; --surface2: #f5f6f8;
      --border: #dfe1e6; --accent: #5b52e0; --text: #1e293b;
      --muted: #64748b; --danger: #dc2626; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      padding: 20px;
    }

    /* ── Animated background orbs ── */
    .bg-orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
    }
    .bg-orb-1 { width: 400px; height: 400px; background: rgba(108,99,255,.12);
                top: -100px; right: -80px; }
    .bg-orb-2 { width: 300px; height: 300px; background: rgba(74,222,128,.08);
                bottom: -60px; left: -60px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 44px 40px; width: 100%;
      max-width: 420px; box-shadow: 0 32px 80px rgba(0,0,0,.45);
      position: relative; z-index: 1;
    }

    /* ── Brand ── */
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .brand-icon {
      width: 40px; height: 40px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; flex-shrink: 0;
    }
    .brand-name { font-size: 15px; font-weight: 700; color: var(--accent); }
    .brand-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 12px; color: var(--muted);
      font-weight: 600; margin-bottom: 7px; letter-spacing: .2px;
    }

    /* Persona pick list */
    .persona-grid {
      display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
    }
    .persona-option {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 10px;
      border: 2px solid var(--border); background: var(--surface2);
      cursor: pointer; transition: border-color .15s, background .15s;
      user-select: none;
    }
    .persona-option:hover { border-color: var(--accent); background: rgba(108,99,255,.07); }
    .persona-option.selected {
      border-color: var(--accent); background: rgba(108,99,255,.12);
    }
    .persona-option input[type="radio"] { display: none; }
    .persona-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; flex-shrink: 0;
    }
    .persona-info { flex: 1; min-width: 0; }
    .persona-name { font-size: 13px; font-weight: 600; }
    .persona-role { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .persona-check {
      font-size: 16px; opacity: 0; transition: opacity .15s; flex-shrink: 0;
    }
    .persona-option.selected .persona-check { opacity: 1; }

    input[type="password"] {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: var(--accent); }

    .submit-btn {
      width: 100%; padding: 12px; background: var(--accent);
      border: none; border-radius: 9px; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity .15s, transform .1s; margin-top: 20px;
      letter-spacing: .2px;
    }
    .submit-btn:hover  { opacity: .88; }
    .submit-btn:active { transform: scale(.98); }

    .error {
      background: rgba(248,113,113,.1); border: 1px solid var(--danger);
      color: var(--danger); border-radius: 8px; padding: 10px 14px;
      font-size: 13px; margin-bottom: 18px; display: none;
    }
    .error.show { display: block; }

    .footer {
      text-align: center; font-size: 11px; color: var(--muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="card">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div>
      <div class="brand-name">Informatica Converter</div>
      <div class="brand-sub">PowerCenter → Python / PySpark / dbt</div>
    </div>
  </div>

  <h1>Sign in</h1>
  <p class="subtitle">Select your profile and enter the access password.</p>

  <div class="error" id="errorMsg">Incorrect password — please try again.</div>

  <form method="POST" action="/login" id="loginForm">

    <!-- ── Persona pick list ── -->
    <div class="field">
      <label>Who are you?</label>
      <div class="persona-grid" id="personaGrid">

        <label class="persona-option" id="opt0">
          <input type="radio" name="persona" value="Asin D"/>
          <div class="persona-avatar" style="background:rgba(108,99,255,.2);color:#a5b4fc">AD</div>
          <div class="persona-info">
            <div class="persona-name">Asin D</div>
            <div class="persona-role">Data Engineer · Submitter</div>
          </div>
          <span class="persona-check">✓</span>
        </label>

        <label class="persona-option" id="opt1">
          <input type="radio" name="persona" value="Priya Nair"/>
          <div class="persona-avatar" style="background:rgba(34,211,238,.15);color:#22d3ee">PN</div>
          <div class="persona-info">
            <div class="persona-name">Priya Nair</div>
            <div class="persona-role">Business Analyst · Gate 1 Reviewer</div>
          </div>
          <span class="persona-check">✓</span>
        </label>

        <label class="persona-option" id="opt2">
          <input type="radio" name="persona" value="James Park"/>
          <div class="persona-avatar" style="background:rgba(251,146,60,.15);color:#fb923c">JP</div>
          <div class="persona-info">
            <div class="persona-name">James Park</div>
            <div class="persona-role">Security Architect · Gate 2 Reviewer</div>
          </div>
          <span class="persona-check">✓</span>
        </label>

        <label class="persona-option" id="opt3">
          <input type="radio" name="persona" value="Sarah Chen"/>
          <div class="persona-avatar" style="background:rgba(74,222,128,.15);color:#4ade80">SC</div>
          <div class="persona-info">
            <div class="persona-name">Sarah Chen</div>
            <div class="persona-role">Migration Lead · Gate 3 Reviewer</div>
          </div>
          <span class="persona-check">✓</span>
        </label>

        <label class="persona-option" id="opt4">
          <input type="radio" name="persona" value="Maya Patel"/>
          <div class="persona-avatar" style="background:rgba(251,191,36,.15);color:#fbbf24">MP</div>
          <div class="persona-info">
            <div class="persona-name">Maya Patel</div>
            <div class="persona-role">Platform Engineer · Submitter</div>
          </div>
          <span class="persona-check">✓</span>
        </label>

      </div>
    </div>

    <!-- ── Password ── -->
    <div class="field">
      <label for="password">Access Password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter password" autocomplete="current-password"/>
    </div>

    <button type="submit" class="submit-btn">Sign in →</button>
  </form>

  <div class="footer">Informatica Conversion Tool · Internal</div>
</div>

<script>
  // Show error if redirected back with ?error=1
  if (new URLSearchParams(window.location.search).get('error')) {
    document.getElementById('errorMsg').classList.add('show');
  }

  // Persona selection highlight
  document.querySelectorAll('.persona-option input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', () => {
      document.querySelectorAll('.persona-option').forEach(opt => opt.classList.remove('selected'));
      radio.closest('.persona-option').classList.add('selected');
    });
  });
</script>
</body>
</html>
